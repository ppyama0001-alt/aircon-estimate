<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エアコン見積アプリ Ver.3</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
background:#eef3f8;
margin:0;
padding:12px;
color:#222;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

h1{
margin:0 0 10px;
font-size:30px;
color:#004b8d;
}

h2{
font-size:20px;
border-left:6px solid #004b8d;
padding-left:8px;
margin-top:0;
margin-bottom:10px;
}

label{
display:block;
font-weight:bold;
margin-top:10px;
margin-bottom:4px;
font-size:15px;
}

input,
select{
width:100%;
padding:10px;
font-size:18px;
border-radius:10px;
border:1px solid #cfd7df;
box-sizing:border-box;
background:white;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
display:grid;
grid-template-columns:34px 1fr 110px;
align-items:center;
gap:8px;
padding:8px;
border:1px solid #dde5ed;
border-radius:10px;
margin-bottom:6px;
font-size:15px;
}

.option input[type=checkbox]{
width:22px;
height:22px;
}

.option input[type=number]{
text-align:right;
padding:8px;
font-size:16px;
}

.sub{
font-size:12px;
color:#666;
line-height:1.5;
margin-top:6px;
}

.resultLine{
display:flex;
justify-content:space-between;
padding:5px 0;
border-bottom:1px dotted #bbb;
font-size:16px;
}

.resultLine b{
white-space:nowrap;
}

.totalBox{
background:#fff1cc;
border:3px solid #e0b34f;
border-radius:14px;
padding:14px;
text-align:center;
margin-top:10px;
}

.totalTitle{
font-size:18px;
font-weight:bold;
}

.totalAmount{
font-size:40px;
font-weight:900;
margin-top:4px;
}

button{
width:100%;
padding:14px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:12px;
background:#004b8d;
color:white;
margin-top:12px;
cursor:pointer;
}

@media(max-width:700px){

.row{
grid-template-columns:1fr;
}

.option{
grid-template-columns:30px 1fr 90px;
font-size:14px;
}

.totalAmount{
font-size:34px;
}

}

@media print {

body{
background:white;
padding:0;
margin:0;
zoom:0.82;
}

.container{
max-width:100%;
margin:0;
padding:0;
}

.card{
box-shadow:none;
border-radius:0;
padding:8px 10px;
margin-bottom:4px;
page-break-inside:avoid;
}

h1{
font-size:20px;
margin-bottom:6px;
}

h2{
font-size:14px;
margin-bottom:6px;
}

label{
font-size:11px;
margin-top:4px;
margin-bottom:1px;
}

input,
select{
padding:3px 5px;
font-size:11px;
height:24px;
}

.option{
padding:3px;
margin-bottom:2px;
grid-template-columns:18px 1fr 65px;
font-size:10px;
}

.option input[type=checkbox]{
width:14px;
height:14px;
}

.option input[type=number]{
font-size:10px;
padding:2px;
height:20px;
}

.sub{
font-size:9px;
line-height:1.3;
margin-top:2px;
}

.resultLine{
font-size:11px;
padding:2px 0;
}

.totalBox{
padding:6px;
margin-top:4px;
}

.totalTitle{
font-size:11px;
}

.totalAmount{
font-size:24px;
margin-top:2px;
}

button{
display:none;
}

@page{
size:A4 portrait;
margin:5mm;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>エアコン見積アプリ Ver.3</h1>

<div class="row">

<div>
<label>お客様名</label>
<input type="text" placeholder="例：山田様">
</div>

<div>
<label>担当者</label>
<input type="text" placeholder="例：坂田">
</div>

</div>

<div class="row">

<div>
<label>受注月</label>

<select id="month" onchange="calc()">
<option value="1">1月</option>
<option value="2">2月</option>
<option value="3">3月</option>
<option value="4">4月</option>
<option value="5">5月</option>
<option value="6">6月</option>
<option value="7">7月</option>
<option value="8">8月</option>
<option value="9">9月</option>
<option value="10">10月</option>
<option value="11">11月</option>
<option value="12">12月</option>
</select>

</div>

<div>
<label>型番</label>
<input type="text" placeholder="例：CS-EX405D2">
</div>

</div>

<label>本体価格（税込）</label>
<input type="number" id="body" value="0" oninput="calc()">

<label>値引き</label>
<input type="number" id="discount" value="0" oninput="calc()">

<div class="sub">
標準工事費：29,500円（配管4mまで）<br>
受注月が6〜8月の場合、夏期暑熱対策費5,000円を自動加算
</div>

</div>

<div class="card">

<h2>追加工事</h2>

<div class="option">
<input type="checkbox" id="removeCheck" onchange="calc()">
<div>既存取り外し</div>
<input type="number" id="removePrice" value="5500" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="recycleCheck" onchange="calc()">
<div>リサイクル</div>
<input type="number" id="recyclePrice" value="4290" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="coverCheck" onchange="calc()">
<div>化粧カバー</div>
<input type="number" id="coverPrice" value="8800" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="circuitCheck" onchange="calc()">
<div>専用回路工事</div>
<input type="number" id="circuitPrice" value="22000" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="voltageCheck" onchange="calc()">
<div>電圧切替</div>
<input type="number" id="voltagePrice" value="3300" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="holeCheck" onchange="calc()">
<div>穴あけ工事</div>
<input type="number" id="holePrice" value="5500" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="highCheck" onchange="calc()">
<div>高所作業</div>
<input type="number" id="highPrice" value="11000" oninput="calc()">
</div>

<div class="option">
<input type="checkbox" id="pipeCheck" onchange="calc()">
<div>配管延長</div>
<input type="number" id="pipePrice" value="6600" oninput="calc()">
</div>

<label>その他追加費用</label>
<input type="number" id="other" value="0" oninput="calc()">

</div>

<div class="card">

<h2>見積結果</h2>

<div class="resultLine">
<span>本体価格</span>
<b id="rBody">0円</b>
</div>

<div class="resultLine">
<span>標準工事費</span>
<b>29,500円</b>
</div>

<div class="resultLine">
<span>追加工事費</span>
<b id="rOption">0円</b>
</div>

<div class="resultLine">
<span>夏期暑熱対策費</span>
<b id="rSummer">0円</b>
</div>

<div class="resultLine">
<span>値引き</span>
<b id="rDiscount">0円</b>
</div>

<div class="totalBox">

<div class="totalTitle">
税込合計
</div>

<div class="totalAmount" id="total">
29,500円
</div>

</div>

<button onclick="window.print()">
印刷・PDF保存
</button>

</div>

</div>

<script>

const standardFee = 29500;

function yen(num){
return Number(num).toLocaleString('ja-JP') + '円';
}

function checked(checkId, priceId){

if(document.getElementById(checkId).checked){

return Number(
document.getElementById(priceId).value
) || 0;

}

return 0;

}

function calc(){

const month =
Number(document.getElementById('month').value);

const body =
Number(document.getElementById('body').value) || 0;

const discount =
Number(document.getElementById('discount').value) || 0;

const remove =
checked('removeCheck','removePrice');

const recycle =
checked('recycleCheck','recyclePrice');

const cover =
checked('coverCheck','coverPrice');

const circuit =
checked('circuitCheck','circuitPrice');

const voltage =
checked('voltageCheck','voltagePrice');

const hole =
checked('holeCheck','holePrice');

const high =
checked('highCheck','highPrice');

const pipe =
checked('pipeCheck','pipePrice');

const other =
Number(document.getElementById('other').value) || 0;

const optionTotal =
remove +
recycle +
cover +
circuit +
voltage +
hole +
high +
pipe +
other;

let summer = 0;

if(month >= 6 && month <= 8){

summer = 5000;

}

const total =
body +
standardFee +
optionTotal +
summer -
discount;

document.getElementById('rBody').innerText =
yen(body);

document.getElementById('rOption').innerText =
yen(optionTotal);

document.getElementById('rSummer').innerText =
yen(summer);

document.getElementById('rDiscount').innerText =
'-' + yen(discount);

document.getElementById('total').innerText =
yen(total);

}

calc();

</script>

</body>
</html>
