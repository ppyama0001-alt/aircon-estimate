<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エアコン見積アプリ</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
margin:20px;
background:#f4f7fb;
}

h1{
font-size:28px;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
max-width:700px;
margin:auto;
}

label{
display:block;
margin-top:14px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
font-size:18px;
margin-top:6px;
box-sizing:border-box;
border-radius:10px;
border:1px solid #ccc;
}

.total{
margin-top:20px;
padding:20px;
background:#fff2cf;
border:2px solid #e0b34f;
border-radius:14px;
font-size:32px;
font-weight:bold;
text-align:center;
}

.note{
margin-top:12px;
font-size:14px;
color:#666;
line-height:1.6;
}
</style>
</head>

<body>

<div class="card">

<h1>エアコン見積アプリ</h1>

<label>受注月</label>
<select id="month" onchange="calc()">
<option value="1">1月</option>
<option value="2">2月</option>
<option value="3">3月</option>
<option value="4">4月</option>
<option value="5">5月</option>
<option value="6">6月</option>
<option value="7">7月</option>
<option value="8">8月</option>
<option value="9">9月</option>
<option value="10">10月</option>
<option value="11">11月</option>
<option value="12">12月</option>
</select>

<label>本体価格（税込）</label>
<input type="number" id="body" value="0" oninput="calc()">

<label>追加工事費</label>
<input type="number" id="option" value="0" oninput="calc()">

<label>値引き</label>
<input type="number" id="discount" value="0" oninput="calc()">

<div class="note">
標準工事費：29,500円（配管4mまで）<br>
受注月が6〜8月の場合、夏期暑熱対策費5,000円を自動加算
</div>

<div class="total" id="total">
29,500円
</div>

</div>

<script>

const standardFee = 29500;

function yen(num){
return num.toLocaleString('ja-JP') + '円';
}

function calc(){

const month = Number(document.getElementById('month').value);
const body = Number(document.getElementById('body').value) || 0;
const option = Number(document.getElementById('option').value) || 0;
const discount = Number(document.getElementById('discount').value) || 0;

let summer = 0;

if(month >= 6 && month <= 8){
summer = 5000;
}

const total =
body +
standardFee +
option +
summer -
discount;

document.getElementById('total').innerText =
yen(total);

}

calc();

</script>

</body>
</html>
